{% load static %}
<section class="relative overflow-hidden min-h-[540px] mb-10 rounded-3xl flex items-center">
    <img src="{% static 'images/hero.jpg' %}" alt="Hero" class="absolute inset-0 h-full w-full object-cover">
    <div class="absolute inset-0 bg-linear-to-r from-green-800 via-green-800/65 to-transparent"></div>
    <div class="relative max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-20 w-full">
        <div class="max-w-xl xl:pl-10">
            <span class="inline-flex items-center gap-1.5 px-4 py-1.5 text-xs font-semibold text-orange-300 bg-orange-300/10 rounded-full mb-5">
                <img src="{% static 'icons/leaf-orange.svg' %}" class="size-4">
                Farm-Fresh & Organic
            </span>
            
            <h1 class="font-serif text-4xl sm:text-5xl lg:text-6xl text-white leading-tight mb-5">
                Nourish your home with
                <span class="text-orange-300">Earth's Finest</span>
            </h1>

            <p class="text-base text-white/70 leading-relaxed mb-8 max-w-md">
                Fresh, organic groceries delivered from local forms to your doorstep. Quality you can taste, convenience you deserver.
            </p>
            
            <div class="flex flex-wrap gap-3">
                <a href="{% url 'Products' %}" class="px-7 py-3 bg-orange-400 text-white font-semibold rounded-full hover:bg-orange-500 transition-all flex items-center justify-center gap-2 active:scale-[0.98]">
                    Shop Now 
                    <img src="{% static 'icons/right-arrow-white.svg' %}" class="size-5">
                </a>
                <a href="{% url 'Products' %}" class="px-7 py-3 bg-white/10 text-white font-semibold rounded-full hover:bg-white/20 transition-all border border-white/20">
                    Brows Categories
                </a>
            </div>
        </div>
    </div>
</section>
