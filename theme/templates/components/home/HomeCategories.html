{% load static %}
<section class="py-16">
    <div class="max-w-7xl mx-auto">
        <div>
            <h2 class="text-2xl font-semibold">Browse Categories</h2>
            <p class="text-sm text-zinc-400 mt-1">Find exactly what you need using</p>
        </div>
        <div class="flex items-center mt-8 overflow-x-scroll no-scrollbar">
            
            {% for cat in categoriesData %}
                <a href= "{% url 'Products' %}?category={{ cat.slug }}" class="group flex flex-col items-center gap-3 p-4">
                    <div class="size-16 sm:size-24 sm:p-2 rounded-2xl overflow-hidden bg-orange-100 group-hover:ring-2 ring-orange-300/75 transition-all">
                        <img src="{% static 'images/' %}{{ cat.image }}.png" alt="{{ cat.name }}" class="w-full h-full object-contain rounded-full transition-all">
                    </div>
                    <span class="text-xs font-medium text-zinc-600 text-center leading-tight">{{ cat.name }}</span>
                </a>
            {% endfor %}
                
        </div>
    </div>
</section>
