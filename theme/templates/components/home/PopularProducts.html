{% load static %}
<section class="pb-16">
    <div class="max-w-7xl mx-auto">
        <div class="flex items-center justify-between mb-8">
            <div>
                <h2 class="text-2xl font-semibold">Popular Porducts</h2>
                <p class="text-sm text-zinc-400 mt-1">Top-rated products this season</p>
            </div>
            <a href="{% url 'Products' %}" class="text-sm font-semibold text-orange-300 hover:text-orange-600 flex items-center gap-1 transition-colors">
                View All
                <!-- <img src="{% static 'icons/right-arrow-white.svg' %}" class="size-4"> -->
            </a>
        </div>
        <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-5 gap-4 xl:gap-8">
            
            {% for product in products %}
                {% include 'components/ProductCard.html' with product=product %}
            {% endfor %}
                
        </div>
    </div>
</section>
